name: CI Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest-playwright
        playwright install
    
    - name: Lint code with Flake8
      run: flake8 src/ tests/

    # 1. Aşama: İzole Unit ve Integration Testleri (Testcontainers ile DB otomatik kalkar)
    - name: Run Unit & Integration Tests
      run: pytest tests/unit tests/integration --cov=src --cov-fail-under=70

    # 2. Aşama: Docker Image Build
    - name: Build Docker Image
      run: docker build -t quote-api-web:${{ github.sha }} .

    # 3. Aşama: E2E ve Smoke için Geçici Ortamı (Deploy) Ayağa Kaldır
    # docker-compose.yml dosyanın, build edilen imajı kullanması için ortam değişkeni atıyoruz
    - name: Start Test Environment
      env:
        API_IMAGE: quote-api-web:${{ github.sha }}
      run: |
        docker compose up -d
        sleep 15 # Servislerin (DB, LocalStack, API) tam hazır olması için bekleme süresi

    # 4. Aşama: E2E Testleri (Docker container'ındaki API'ye istek atar)
    - name: Run E2E Playwright Tests
      run: pytest tests/e2e/

    # 5. Aşama: Smoke Test (Postman/Newman)
    - name: Run Newman Tests
      uses: matt-ball/newman-action@master
      with:
        collection: postman/collection.json