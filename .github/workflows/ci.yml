name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Testlerin koşturulabilmesi için geçici bir PostgreSQL ayağa kaldırıyoruz (Şartname Ek B uyumlu)
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: arda
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: quotedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arda -d quotedb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Kodu Kopyala (Checkout)
      uses: actions/checkout@v4 [cite: 207]

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5 [cite: 208]
      with:
        python-version: '3.11' [cite: 209]

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt [cite: 210]

    - name: 1. Adım - Pytest Unit Testleri ve Coverage Kontrolü
      env:
        DATABASE_URL: postgresql://arda:supersecretpassword@localhost:5432/quotedb
      run: |
        # %70 coverage barajının altına düşerse pipeline'ı patlat (Şartname gereği)
        PYTHONPATH=. pytest --cov=src --cov-fail-under=70 tests/ [cite: 211]

    - name: 2. Adım - Multi-stage Docker Build Testi
      run: |
        docker build -t quote-api-web:${{ github.sha }} . [cite: 212]

    - name: Node.js Kur (Newman için)
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Newman Yükle
      run: npm install -g newman

    - name: Uygulamayı Geçici Olarak Arka Planda Başlat (Smoke/Newman Testi için)
      env:
        DATABASE_URL: postgresql://arda:supersecretpassword@localhost:5432/quotedb
        AWS_S3_ENDPOINT: http://localhost:4566 # G Actions yerel simülasyonu için geçici url
      run: |
        uvicorn src.main:app --host 0.0.0.0 --port 8000 &
        sleep 3 # Uygulamanın tam açılması için 3 saniye bekle

    - name: 3. Adım - Newman ile Postman İstek Otomasyonu
      run: |
        newman run postman/collection.json
