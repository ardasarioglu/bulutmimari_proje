apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: "arda"
            - name: POSTGRES_PASSWORD
              value: "supersecretpassword"
            - name: POSTGRES_DB
              value: "quotedb"
          ports:
            - containerPort: 5432